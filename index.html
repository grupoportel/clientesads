<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Desempenho de Clientes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Estilos para os anéis de desempenho */
        .performance-ring {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1.25rem;
            color: white;
            border: 6px solid;
            transition: background-color 0.3s, border-color 0.3s;
            position: relative; /* Necessário para posicionar o input */
        }
        /* Cores condicionais baseadas em classes */
        .ring-red { background-color: #EF4444; border-color: #DC2626; }
        .ring-yellow { background-color: #F59E0B; border-color: #D97706; }
        .ring-green { background-color: #22C55E; border-color: #16A34A; }

        /* Estilo para o input numérico que aparece ao clicar */
        .score-input-visible {
            width: 50px;
            background-color: transparent;
            text-align: center;
            color: white;
            font-weight: bold;
            font-size: 1.25rem;
            border: none;
            outline: none;
            -moz-appearance: textfield; /* Firefox */
        }
        .score-input-visible::-webkit-outer-spin-button,
        .score-input-visible::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        
        /* Esconder o input de arquivo padrão */
        .logo-input {
            display: none;
        }

        /* Cursor de ponteiro para a logo para indicar que é clicável */
        .logo-label {
            cursor: pointer;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 p-4 sm:p-6 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-3xl sm:text-4xl font-bold text-gray-900">Dashboard de Desempenho</h1>
            <p class="text-gray-600 mt-2">Adicione e gerencie o desempenho dos seus clientes.</p>
        </header>

        <!-- Botão para adicionar novo cliente -->
        <div class="flex justify-center mb-8">
            <button id="add-client-btn" class="bg-blue-600 text-white font-semibold py-2 px-6 rounded-lg shadow-md hover:bg-blue-700 transition-colors">
                Adicionar Novo Cliente
            </button>
        </div>

        <!-- Container para os cards dos clientes -->
        <div id="clients-container" class="space-y-6">
            <!-- O card do cliente modelo será clonado aqui -->
        </div>

        <!-- Template do Card do Cliente (invisível) -->
        <template id="client-card-template">
            <div class="client-card bg-white rounded-xl shadow-lg p-6 border border-gray-200">
                <div class="flex flex-col md:flex-row items-center gap-6">
                    <!-- Seção de Informações do Cliente -->
                    <div class="flex-shrink-0 flex flex-col items-center text-center">
                        <label class="logo-label">
                            <img src="https://placehold.co/100x100/E2E8F0/4A5568?text=Logo" alt="Logo do Cliente" class="client-logo w-24 h-24 rounded-full object-cover border-4 border-gray-200 hover:opacity-80 transition-opacity">
                            <input type="file" accept="image/*" class="logo-input">
                        </label>
                         <div class="mt-4 w-48">
                            <input type="text" placeholder="Nome do Cliente" class="client-name text-lg font-bold text-gray-900 text-center w-full bg-gray-50 rounded-md border-gray-300 focus:ring-blue-500 focus:border-blue-500">
                            <input type="text" placeholder="Plataformas" class="platform-name text-sm text-gray-500 text-center w-full bg-gray-50 rounded-md border-gray-300 mt-1 focus:ring-blue-500 focus:border-blue-500">
                        </div>
                    </div>

                    <!-- Divisor -->
                    <div class="w-full md:w-px h-px md:h-24 bg-gray-200"></div>

                    <!-- Seção de Desempenho -->
                    <div class="flex-grow w-full">
                        <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 text-center">
                            <!-- Anel de Meta Ads -->
                            <div class="performance-item flex flex-col items-center">
                                <div class="performance-ring" data-score="8">
                                    <span class="score-display">8/10</span>
                                </div>
                                <label class="mt-2 font-semibold text-sm text-gray-600">META ADS</label>
                            </div>
                            <!-- Anel de Google Ads -->
                            <div class="performance-item flex flex-col items-center">
                                <div class="performance-ring" data-score="5">
                                    <span class="score-display">5/10</span>
                                </div>
                                <label class="mt-2 font-semibold text-sm text-gray-600">GOOGLE ADS</label>
                            </div>
                            <!-- Anel de Comunicação -->
                            <div class="performance-item flex flex-col items-center">
                                <div class="performance-ring" data-score="3">
                                    <span class="score-display">3/10</span>
                                </div>
                                <label class="mt-2 font-semibold text-sm text-gray-600">COMUNICAÇÃO</label>
                            </div>
                            <!-- Anel de Demandas -->
                            <div class="performance-item flex flex-col items-center">
                                <div class="performance-ring" data-score="9">
                                    <span class="score-display">9/10</span>
                                </div>
                                <label class="mt-2 font-semibold text-sm text-gray-600">DEMANDAS</label>
                            </div>
                        </div>
                    </div>
                     <!-- Botão de Remover -->
                    <div class="flex-shrink-0">
                        <button class="remove-client-btn text-red-500 hover:text-red-700 font-semibold py-2 px-4">
                            Remover
                        </button>
                    </div>
                </div>
            </div>
        </template>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const clientsContainer = document.getElementById('clients-container');
            const addClientBtn = document.getElementById('add-client-btn');
            const clientCardTemplate = document.getElementById('client-card-template');

            // Função para atualizar a cor do anel com base na nota
            function updateRingColor(ringElement, score) {
                // Remove as classes de cor antigas
                ringElement.classList.remove('ring-red', 'ring-yellow', 'ring-green');

                // Adiciona a classe de cor correta
                if (score >= 1 && score <= 3) {
                    ringElement.classList.add('ring-red');
                } else if (score >= 4 && score <= 7) {
                    ringElement.classList.add('ring-yellow');
                } else if (score >= 8 && score <= 10) {
                    ringElement.classList.add('ring-green');
                }
            }
            
            // Função para criar um novo card de cliente
            function createClientCard() {
                const cardClone = clientCardTemplate.content.cloneNode(true);
                const clientCard = cardClone.querySelector('.client-card');
                
                // Lógica para upload da logo
                const logoInput = clientCard.querySelector('.logo-input');
                const clientLogo = clientCard.querySelector('.client-logo');
                logoInput.addEventListener('change', () => {
                    if (logoInput.files && logoInput.files[0]) {
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            clientLogo.src = e.target.result;
                        };
                        reader.readAsDataURL(logoInput.files[0]);
                    }
                });

                // Lógica para edição das notas
                const performanceRings = clientCard.querySelectorAll('.performance-ring');
                performanceRings.forEach(ring => {
                    // Inicializa a cor
                    updateRingColor(ring, parseInt(ring.dataset.score, 10));

                    ring.addEventListener('click', () => {
                        const scoreDisplay = ring.querySelector('.score-display');
                        if (!scoreDisplay) return; // Se já estiver editando, não faz nada

                        const currentScore = ring.dataset.score;
                        
                        // Cria o input para edição
                        const input = document.createElement('input');
                        input.type = 'number';
                        input.min = '0';
                        input.max = '10';
                        input.value = currentScore;
                        input.className = 'score-input-visible';

                        // Substitui o span pelo input
                        ring.innerHTML = '';
                        ring.appendChild(input);
                        input.focus();
                        input.select();

                        // Função para finalizar a edição
                        const finishEditing = () => {
                            let newScore = parseInt(input.value, 10);
                            if (isNaN(newScore) || newScore < 0) newScore = 0;
                            if (newScore > 10) newScore = 10;

                            ring.dataset.score = newScore;
                            ring.innerHTML = `<span class="score-display">${newScore}/10</span>`;
                            updateRingColor(ring, newScore);
                        };

                        // Finaliza ao perder o foco ou apertar Enter
                        input.addEventListener('blur', finishEditing);
                        input.addEventListener('keydown', (e) => {
                            if (e.key === 'Enter') {
                                input.blur();
                            }
                        });
                    });
                });

                // Adiciona o event listener para o botão de remover
                const removeBtn = clientCard.querySelector('.remove-client-btn');
                removeBtn.addEventListener('click', () => {
                    clientCard.remove();
                });

                clientsContainer.appendChild(clientCard);
            }

            // Event listener para o botão de adicionar cliente
            addClientBtn.addEventListener('click', createClientCard);
            
            // Cria um card inicial para começar
            createClientCard();
        });
    </script>

</body>
</html>
